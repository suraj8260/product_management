<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Home</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 30px 20px;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            color: #1e293b;
            width: 420px;
            padding: 35px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        .card h2 {
            margin-bottom: 15px;
        }

        .card p {
            color: #475569;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn {
            text-decoration: none;
            background: #2563eb;
            color: white;
            padding: 13px 22px;
            border-radius: 10px;
            display: inline-block;
            font-weight: bold;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <header>Admin Dashboard</header>

    <div class="container">
        <div class="card">
            <h2>Welcome Admin</h2>
            <p>
                Click below to open Product Management and access all services
                like add product, update product, delete product, search product,
                and view all products.
            </p>
            <a class="btn" href="product_management.html">Product Management</a>
        </div>
    </div>
</body>
</html>
