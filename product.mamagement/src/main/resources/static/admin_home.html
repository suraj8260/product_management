<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Home Dashboard</title>
    <!-- Modern fonts for premium styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            /* Premium deep modern gradient */
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* prevents scrollbars from ambient glow */
            position: relative;
            z-index: 0;
        }

        /* Ambient glowing orbs for visual depth */
        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.6;
            animation: floatGlow 15s ease-in-out infinite alternate;
        }

        .glow-1 {
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, 0.25);
            top: -150px;
            left: -150px;
        }

        .glow-2 {
            width: 600px;
            height: 600px;
            background: rgba(236, 72, 153, 0.15);
            bottom: -200px;
            right: -200px;
            animation-delay: -5s;
        }

        @keyframes floatGlow {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.1) translate(5%, 5%); }
            100% { transform: scale(0.9) translate(-5%, -2%); }
        }

        header {
            text-align: center;
            padding: 50px 20px 20px 20px;
            font-size: 42px;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            letter-spacing: -1.5px;
            /* Gradient text effect */
            background: linear-gradient(to right, #f8fafc, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(-30px);
        }

        @keyframes slideDown {
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 10;
        }

        .card {
            /* Dark glassmorphism card */
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            width: 100%;
            max-width: 480px;
            padding: 50px 45px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08) inset;
            animation: scaleUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: scale(0.95);
            position: relative;
        }

        @keyframes scaleUp {
            to { opacity: 1; transform: scale(1); }
        }

        .icon-wrapper {
            width: 88px;
            height: 88px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(236,72,153,0.15));
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px auto;
            color: #818cf8;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2) inset;
        }

        .card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 30px;
            margin-bottom: 16px;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .card p {
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .btn {
            text-decoration: none;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
            padding: 18px 32px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.6);
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0; 
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: all 0.6s ease;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.8);
        }

        .btn:hover::after {
            left: 100%;
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Subtle grid pattern overlay for extra texture */
        .grid-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

    </style>
</head>
<body>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="grid-overlay"></div>

    <header>Admin Portal</header>

    <div class="container">
        <div class="card">
            <!-- Professional Dashboard Icon -->
            <div class="icon-wrapper">
                <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="9" rx="1"></rect>
                    <rect x="14" y="3" width="7" height="5" rx="1"></rect>
                    <rect x="14" y="12" width="7" height="9" rx="1"></rect>
                    <rect x="3" y="16" width="7" height="5" rx="1"></rect>
                </svg>
            </div>
            
            <h2>Welcome, Admin</h2>
            <p>
                Access your control center to seamlessly add, update, search, or view the complete product inventory.
            </p>
            
            <a class="btn" href="product_management.html">
                Manage Products
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </a>
        </div>
    </div>
</body>
</html>
