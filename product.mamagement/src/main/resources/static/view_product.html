<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Product</title>
    <!-- Modern fonts for premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;       /* Violet theme for Search */
            --primary-hover: #7c3aed;
            --secondary: #a78bfa;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-input: #ffffff;
            --border-color: #cbd5e1;
            --success-bg: #f5f3ff;
            --success-text: #4c1d95;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract glowing background blobs */
        .decoration {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            z-index: 0;
            opacity: 0.4;
            animation: float 20s infinite ease-in-out alternate;
            pointer-events: none;
        }

        .blob-1 { top: -10%; left: -10%; width: 450px; height: 450px; background: #c4b5fd; }
        .blob-2 { bottom: -15%; right: -10%; width: 500px; height: 500px; background: #e0e7ff; animation-delay: -5s; }

        @keyframes float {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.05) translate(3%, 5%); }
            100% { transform: scale(0.95) translate(-3%, -3%); }
        }

        header {
            padding: 24px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            z-index: 10;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-link {
            text-decoration: none;
            background: white;
            color: var(--text-main);
            padding: 10px 24px;
            border-radius: 9999px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .btn-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px -3px rgba(0,0,0,0.1);
            border-color: #94a3b8;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 40px auto 60px auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 45px 50px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1), 0 0 0 1px rgba(255,255,255,0.8) inset;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            z-index: 10;
            position: relative;
        }

        .card-top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 24px 24px 0 0;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .header-icon {
            width: 64px;
            height: 64px;
            background: #f5f3ff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            margin: 0 auto 20px auto;
            border: 1px solid #ede9fe;
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.15);
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #0f172a;
            text-align: center;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 36px;
            font-size: 15px;
        }

        .search-box {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            flex-grow: 1;
            position: relative;
        }

        input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid var(--border-color);
            background: var(--bg-input);
            border-radius: 14px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.3s ease;
        }

        .form-group:focus-within .search-icon {
            color: var(--primary);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        input::placeholder { color: #94a3b8; }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.6);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: all 0.6s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgba(139, 92, 246, 0.8);
        }

        button:hover::after { left: 100%; }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .message {
            margin-top: 10px;
            padding: 16px 20px;
            border-radius: 12px;
            background: var(--success-bg);
            color: var(--success-text);
            font-weight: 500;
            border: 1px solid #ede9fe;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: scale(0.95);
        }

        .message.error { background: var(--error-bg); color: var(--error-text); border-color: #fecaca; }

        @keyframes popIn { to { opacity: 1; transform: scale(1); } }

        /* Modern Split Card Layout */
        #resultArea {
            margin-top: 30px;
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
        }
        
        #resultArea.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .detail-card {
            display: flex;
            gap: 30px;
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 30px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
            align-items: stretch; /* Match heights */
        }

        /* Description container always on the LEFT */
        .detail-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .info-group {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .info-value {
            font-size: 16px;
            color: var(--text-main);
            line-height: 1.5;
        }

        .badge-id {
            background: #f5f3ff; color: #7c3aed; padding: 6px 12px;
            border-radius: 8px; font-weight: 800; font-family: 'Outfit', sans-serif;
            font-size: 15px; display: inline-block;
        }

        .product-name { font-weight: 800; color: #0f172a; font-size: 24px; font-family: 'Outfit', sans-serif; letter-spacing: -0.5px;}
        .price { font-weight: 800; color: #10b981; font-family: 'Outfit', sans-serif; font-size: 22px; }

        /* Photo always on the RIGHT */
        .detail-photo {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 50%;
            background: #f8fafc;
            border-radius: 16px;
            padding: 10px;
            border: 2px dashed #e2e8f0;
        }

        .full-image {
            width: 100%;
            height: 100%;
            max-height: 350px;
            object-fit: contain; /* ensures image fits beautifully inside the frame */
            border-radius: 12px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .full-image:hover {
            transform: scale(1.05);
        }

        .no-image {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            height: 250px;
            font-size: 15px;
            font-weight: 500;
            gap: 12px;
        }

        @media (max-width: 650px) {
            .container { padding: 40px 24px; width: 95%; margin-top: 20px; }
            .search-box { flex-direction: column; }
            button { width: 100%; }
            /* Mobile View automatically stacks them nicely: image top, text bottom */
            .detail-card { flex-direction: column-reverse; padding: 20px; }
            .detail-photo { max-width: 100%; width: 100%; }
            .full-image { max-height: 300px; }
        }
    </style>
</head>
<body>
    <div class="decoration blob-1"></div>
    <div class="decoration blob-2"></div>

    <header>
        <div class="logo">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #8b5cf6;">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            Admin Panel
        </div>
        <a class="btn-link" href="product_management.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back
        </a>
    </header>

    <div class="container">
        <div class="card-top-bar"></div>

        <div class="header-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </div>

        <h2>Search Database</h2>
        <p class="subtitle">Enter a unique Product ID below to fetch and view its complete details.</p>

        <div class="search-box">
            <div class="form-group">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="number" id="viewId" placeholder="Enter Product ID (e.g. 101)" autocomplete="off" />
            </div>
            
            <button onclick="viewProduct()" id="searchBtn">
                <span id="btnText">Search Product</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
        </div>

        <div id="messageArea"></div>
        <div id="resultArea"></div>
    </div>

    <script>
        async function viewProduct() {
            const idInput = document.getElementById("viewId");
            const id = idInput.value.trim();
            const messageArea = document.getElementById("messageArea");
            const resultArea = document.getElementById("resultArea");
            const btn = document.getElementById("searchBtn");
            const btnText = document.getElementById("btnText");
            const btnSpinner = document.getElementById("btnSpinner");

            if (!id) {
                messageArea.innerHTML = `
                    <div class="message error">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        <div>Please enter a valid Product ID to search.</div>
                    </div>`;
                idInput.focus();
                return;
            }

            // Loading state
            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';
            btn.disabled = true;
            messageArea.innerHTML = "";
            resultArea.classList.remove('visible');
            setTimeout(() => { resultArea.innerHTML = ""; }, 300); // Wait for transition

            try {
                // Exact URL logic
                const response = await fetch(`/viewProduct/${id}`);

                if (!response.ok) {
                    throw new Error("Unable to fetch product. ID might be invalid.");
                }

                const product = await response.json();
                setTimeout(() => { renderResult(product); }, 300);

            } catch (error) {
                console.warn(error);
                
                await new Promise(r => setTimeout(r, 600)); // Fake network delay

                // DEMO MODE fallback
                if (id === "101") {
                    const demoProduct = { 
                        id: 101, 
                        name: "Mechanical Keyboard Pro", 
                        description: "Premium RGB Backlit mechanical keyboard with Cherry MX switches and an aerospace-grade aluminum frame.", 
                        price: 129.99, 
                        photoUrl: "https://images.unsplash.com/photo-1595225476474-87563907a212?w=600&q=80" 
                    };
                    renderResult(demoProduct, true);
                } else {
                    messageArea.innerHTML = `
                        <div class="message error">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                            <div>Product not found or unable to fetch. Try ID "101" for demo testing.</div>
                        </div>`;
                }
            } finally {
                btnText.style.display = 'block';
                btnSpinner.style.display = 'none';
                btn.disabled = false;
            }

            function renderResult(product, isDemo = false) {
                const imgSource = product.photoUrl ?? "";

                messageArea.innerHTML = `
                    <div class="message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        <div>${isDemo ? "(Demo) " : ""}Product fetched successfully.</div>
                    </div>`;

                // Split Layout: Details on left, Photo full-size on right
                resultArea.innerHTML = `
                    <div class="detail-card">
                        <div class="detail-info">
                            <div class="info-group">
                                <div class="info-label">Product ID</div>
                                <div class="info-value"><span class="badge-id">#${product.id ?? "N/A"}</span></div>
                            </div>
                            <div class="info-group">
                                <div class="info-label">Name</div>
                                <div class="info-value product-name">${product.name ?? "N/A"}</div>
                            </div>
                            <div class="info-group">
                                <div class="info-label">Description</div>
                                <div class="info-value">${product.description ?? "-"}</div>
                            </div>
                            <div class="info-group">
                                <div class="info-label">Price</div>
                                <div class="info-value price">$${product.price ? Number(product.price).toFixed(2) : "0.00"}</div>
                            </div>
                        </div>
                        <div class="detail-photo">
                            ${imgSource 
                                ? `<img src="${imgSource}" class="full-image" onerror="this.outerHTML='<div class=\\'no-image\\'><svg width=\\'40\\' height=\\'40\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'2\\'><path d=\\'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\\'></path><polyline points=\\'17 8 12 3 7 8\\'></polyline><line x1=\\'12\\' y1=\\'3\\' x2=\\'12\\' y2=\\'15\\'></line></svg><p>Image Load Error</p></div>'">` 
                                : `<div class="no-image"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg><p>No Image Available</p></div>`
                            }
                        </div>
                    </div>
                `;
                
                setTimeout(() => {
                    resultArea.classList.add('visible');
                }, 50);
            }
        }
    </script>
</body>
</html>
