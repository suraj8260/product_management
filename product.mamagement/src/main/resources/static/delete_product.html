<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delete Product</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; background: #f8fafc; }
        header {
            background: #0f172a;
            color: white;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-link {
            text-decoration: none;
            background: #2563eb;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
        }
        .container {
            width: 90%;
            max-width: 500px;
            margin: 35px auto;
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .message {
            margin-top: 18px;
            padding: 12px;
            border-radius: 8px;
            background: #fee2e2;
            color: #991b1b;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Delete Product</h1>
        <a class="btn-link" href="product_management.html">Back</a>
    </header>

    <div class="container">
        <div class="form-group">
            <label>Product ID</label>
            <input type="number" id="deleteId" />
        </div>

        <button onclick="deleteProduct()">Delete Product</button>

        <div id="messageArea"></div>
    </div>

    <script>
        async function deleteProduct() {
            const id = document.getElementById("deleteId").value;

            const response = await fetch(`/deleteProduct/${id}`, {
                method: "DELETE"
            });

            const result = await response.text();

            document.getElementById("messageArea").innerHTML =
                `<div class="message">${result}</div>`;
        }
    </script>
</body>
</html>
