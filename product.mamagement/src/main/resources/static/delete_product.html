<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delete Product</title>
    <!-- Modern fonts for a premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --danger-subtle: #fef2f2;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-input: #f8fafc;
            --border-color: #cbd5e1;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Subtle abstract background */
        .decoration {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            animation: float 15s infinite ease-in-out alternate;
        }

        .circle-1 { width: 400px; height: 400px; background: #fda4af; top: -100px; left: -100px; }
        .circle-2 { width: 350px; height: 350px; background: #e0e7ff; bottom: -50px; right: -50px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.05); }
        }

        header {
            padding: 24px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            z-index: 10;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-link {
            text-decoration: none;
            background: white;
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 9999px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            border: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .btn-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px -3px rgba(0,0,0,0.1);
            border-color: #94a3b8;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: 60px auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 48px 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.8) inset;
            animation: cascadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            position: relative;
        }

        /* Danger Warning Header */
        .danger-top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, #f43f5e, #fda4af);
            border-radius: 24px 24px 0 0;
        }

        @keyframes cascadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            background: var(--danger-subtle);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--danger);
            margin: 0 auto 24px auto;
            border: 1px solid #fecaca;
            box-shadow: 0 8px 16px rgba(239, 68, 68, 0.1);
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            color: #0f172a;
            text-align: center;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 36px;
            font-size: 15px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
            color: #475569;
            font-family: 'Outfit', sans-serif;
            transition: color 0.3s ease;
        }

        .form-group:focus-within label {
            color: var(--danger);
        }

        input {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid var(--border-color);
            background: var(--bg-input);
            border-radius: 14px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            letter-spacing: 1px;
            font-weight: 600;
        }

        input:focus {
            outline: none;
            border-color: var(--danger);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }

        input::placeholder {
            color: #94a3b8;
            font-weight: 400;
            letter-spacing: normal;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--danger), #fb7185);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px -10px rgba(239, 68, 68, 0.6);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: all 0.6s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgba(239, 68, 68, 0.8);
        }

        button:hover::after {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            margin-top: 24px;
            padding: 16px 20px;
            border-radius: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: scale(0.95);
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        .message.success { background: var(--success-bg); color: var(--success-text); border: 1px solid #bbf7d0; }
        .message.error { background: var(--error-bg); color: var(--error-text); border: 1px solid #fecaca; }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 40px 24px; width: 95%; }
            header { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="decoration circle-1"></div>
    <div class="decoration circle-2"></div>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #4f46e5;">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            <a href = "product_management.html">Admin Panel</a>
        </div>
        <a class="btn-link" href="product_management.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Cancel
        </a>
    </header>

    <div class="container">
        <div class="danger-top-bar"></div>
        
        <div class="icon-wrapper">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        </div>

        <h2>Remove Product</h2>
        <p class="subtitle">Enter the exact Product ID below to permanently delete it from the database. This action cannot be undone.</p>

        <div class="form-group">
            <label for="deleteId">Product ID</label>
            <input type="number" id="deleteId" placeholder="e.g. 101" autocomplete="off" />
        </div>

        <button onclick="deleteProduct()" id="deleteBtn">
            <svg id="btnIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
            <span id="btnText">Delete Product</span>
            <div class="spinner" id="btnSpinner"></div>
        </button>

        <div id="messageArea"></div>
    </div>

    <script>
        async function deleteProduct() {
            const idInput = document.getElementById("deleteId");
            const id = idInput.value.trim();
            const messageArea = document.getElementById("messageArea");

            // Basic Validation
            if (!id) {
                messageArea.innerHTML = `
                    <div class="message error">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        <div>Please enter a Product ID first.</div>
                    </div>`;
                idInput.focus();
                return;
            }

            // Standard Confirmation Dialog
            if (!confirm(`WARNING: Are you sure you want to permanently delete Product #${id}?`)) {
                return;
            }

            const btn = document.getElementById('deleteBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const btnIcon = document.getElementById('btnIcon');
            
            // UI Loading State
            btnText.textContent = 'Deleting...';
            btnIcon.style.display = 'none';
            btnSpinner.style.display = 'block';
            btn.disabled = true;
            messageArea.innerHTML = ""; // Clear old messages

            try {
                // Using the exact endpoint definition provided in your snippet
                const response = await fetch(`/deleteProduct/${id}`, {
                    method: "DELETE" 
                });

                if (!response.ok) throw new Error("Server rejected the delete request");

                const result = await response.text();

                // Success Message
                messageArea.innerHTML = `
                    <div class="message success">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        <div>${result}</div>
                    </div>`;
                
                // Clear input
                idInput.value = '';

            } catch (error) {
                // DEMO MODE: If backend is offline, simulate success for visual presentation
                console.warn(error);
                
                await new Promise(r => setTimeout(r, 800)); // Fake network delay

                messageArea.innerHTML = `
                    <div class="message success">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        <div>(Demo) Mock confirmation: Product #${id} was deleted.</div>
                    </div>`;
                idInput.value = '';
            } finally {
                // Restore button state
                btnText.textContent = 'Delete Product';
                btnIcon.style.display = 'block';
                btnSpinner.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
