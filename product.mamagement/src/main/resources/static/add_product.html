<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add New Product</title>
    <!-- Modern fonts for premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-input: #f8fafc;
            --border-color: #cbd5e1;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Beautiful gradient background */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Decorative glowing orbs in the background */
        .decoration {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            background: #ff758c;
            top: -100px;
            left: -100px;
        }

        .circle-2 {
            width: 500px;
            height: 500px;
            background: #38bdf8;
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.05); }
        }

        header {
            padding: 24px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            z-index: 10;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .btn-link {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            padding: 10px 24px;
            border-radius: 9999px;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-link:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .container {
            width: 90%;
            max-width: 560px;
            margin: auto;
            margin-bottom: 60px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.4) inset;
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
            z-index: 10;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            letter-spacing: -1px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 36px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
            color: #475569;
            font-family: 'Outfit', sans-serif;
            transition: color 0.3s ease;
        }

        .form-group:focus-within label {
            color: var(--primary);
        }

        input, textarea {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid var(--border-color);
            background: var(--bg-input);
            border-radius: 14px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        textarea {
            min-height: 130px;
            resize: vertical;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        input::placeholder, textarea::placeholder {
            color: #94a3b8;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.6);
            margin-top: 12px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0; 
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: all 0.6s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgba(99, 102, 241, 0.8);
        }

        button:hover::after {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            margin-top: 24px;
            padding: 18px;
            border-radius: 14px;
            background: var(--success-bg);
            color: var(--success-text);
            font-weight: 500;
            border: 1px solid #bbf7d0;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: scale(0.95);
        }

        .message.error {
            background: var(--error-bg);
            color: var(--error-text);
            border-color: #fecaca;
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                width: 95%;
            }
            header {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Abstract background elements -->
    <div class="decoration circle-1"></div>
    <div class="decoration circle-2"></div>

    <header>
        <div class="logo">AdminPanel</div>
        <a class="btn-link" href="product_management.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back
        </a>
    </header>

    <div class="container">
        <h2>Enter Details</h2>
        <p class="subtitle">Complete the fields below to add a new product to your inventory.</p>

        <div class="form-group">
            <label for="name">Product Name</label>
            <input type="text" id="name" placeholder="e.g. Mechanical Keyboard" autocomplete="off" />
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" placeholder="Describe the specifications and features..."></textarea>
        </div>

        <div class="form-group">
            <label for="price">Price ($)</label>
            <input type="number" id="price" placeholder="0.00" min="0" step="0.01" />
        </div>

        <div class="form-group">
            <label for="photoUrl">Photo URL</label>
            <input type="url" id="photoUrl" placeholder="https://example.com/image.jpg" />
        </div>

        <button onclick="addProduct()" id="submitBtn">
            <span id="btnText">Add Product</span>
            <div class="spinner" id="btnSpinner"></div>
        </button>

        <div id="messageArea"></div>
    </div>

    <script>
        async function addProduct() {
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            // UI Loading state
            btnText.textContent = 'Processing...';
            btnSpinner.style.display = 'block';
            btn.disabled = true;

            const product = {
                name: document.getElementById("name").value,
                description: document.getElementById("description").value,
                price: parseFloat(document.getElementById("price").value) || parseInt(document.getElementById("price").value), // Kept parseInt compatibility if decimal isn't provided
                photoUrl: document.getElementById("photoUrl").value
            };

            try {
                const response = await fetch("/addProduct", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(product)
                });

                const result = await response.text();

                // Success Message
                document.getElementById("messageArea").innerHTML =
                    `<div class="message">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        <div>${result}</div>
                    </div>`;

            } catch (error) {
                // In case the API is down, show mock success message for demo effect if fetch fails
                // Usually we'd show an error, but let's assume they want to see it work visually even without the backend.
                // We'll show an error box for authenticity.
                document.getElementById("messageArea").innerHTML =
                    `<div class="message error">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <div>Could not connect to server. Error: ${error.message}</div>
                    </div>`;
            } finally {
                // Restore button state
                btnText.textContent = 'Add Product';
                btnSpinner.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
