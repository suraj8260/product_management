<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Dashboard - View All Products</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #ec4899;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(226, 232, 240, 0.8);
            --success-bg: #dcfce7;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract blurred background elements for depth */
        .decoration {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
            animation: float 25s infinite ease-in-out alternate;
            pointer-events: none;
        }

        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #c7d2fe; max-width: 600px; max-height: 600px; }
        .blob-2 { bottom: -10%; right: -5%; width: 45vw; height: 45vw; background: #fbcfe8; max-width: 500px; max-height: 500px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.1) translate(3%, 5%); }
            100% { transform: scale(0.9) translate(-3%, -2%); }
        }

        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #1e293b, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn.outline {
            background: white;
            color: var(--text-main);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(79, 70, 229, 0.4);
        }

        .btn.outline:hover {
            box-shadow: 0 8px 15px -3px rgba(0,0,0,0.1);
            border-color: #cbd5e1;
            color: var(--primary);
        }

        .btn:hover::after {
            left: 100%;
        }

        .container {
            width: 95%;
            max-width: 1400px;
            margin: 30px auto 60px auto;
            position: relative;
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px 40px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08), 0 0 0 1px rgba(255,255,255,0.6) inset;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .actions-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .actions-bar h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
        }

        .message {
            padding: 16px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .message.success { background: var(--success-bg); color: var(--success-text); border: 1px solid #bbf7d0; }
        .message.error { background: var(--error-bg); color: var(--error-text); border: 1px solid #fecaca; }
        .message.info { background: #e0f2fe; color: #075985; border: 1px solid #bae6fd; }

        /* Modern Table Styles */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02) inset;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 900px; /* Ensure table doesn't get too squished */
        }

        th, td {
            padding: 18px 24px;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background: rgba(248, 250, 252, 0.8);
            color: var(--text-muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 15px;
            transition: background 0.2s ease;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.9);
        }

        .badge-id {
            background: #f1f5f9;
            color: #475569;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
        }

        .product-name {
            font-weight: 600;
            color: #0f172a;
            font-size: 16px;
        }

        .price {
            font-weight: 700;
            color: #10b981;
            font-family: 'Outfit', sans-serif;
        }

        .truncate {
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Upgraded Image Previews */
        .product-image {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid white;
            transition: transform 0.3s ease;
        }
        
        .product-image:hover {
            transform: scale(1.1) rotate(2deg);
        }

        .no-image {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 500;
            border: 2px dashed #cbd5e1;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 16px;
            border: 2px dashed #cbd5e1;
        }
        
        .empty-state svg {
            color: #cbd5e1;
            margin-bottom: 16px;
        }
        
        .empty-state p {
            color: var(--text-muted);
            font-size: 18px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="decoration blob-1"></div>
    <div class="decoration blob-2"></div>

    <header>
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #4f46e5;">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <a href = "product_management.html">Inventory Vault</a>
        </h1>
        <a class="btn outline" href="product_management.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back
        </a>
    </header>

    <div class="container">
        <div class="glass-card">
            <div class="actions-bar">
                <h2>All Products</h2>
                <button class="btn" onclick="viewAllProducts()" id="refreshBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                    <span>Refresh Data</span>
                </button>
            </div>

            <div id="messageArea"></div>
            
            <div id="resultArea">
                <div class="empty-state">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                    </svg>
                    <p>Click "Refresh Data" to load the active inventory from the database.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function viewAllProducts() {
            const messageArea = document.getElementById("messageArea");
            const resultArea = document.getElementById("resultArea");
            const btn = document.getElementById("refreshBtn");
            const btnOriginalHTML = btn.innerHTML;

            // Loading state
            btn.innerHTML = `<div class="spinner"></div><span>Loading...</span>`;
            btn.style.pointerEvents = 'none';
            messageArea.innerHTML = `<div class="message info">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                Syncing product database...
            </div>`;
            resultArea.style.opacity = "0.5";
            resultArea.style.transition = "opacity 0.3s ease";

            try {
                // Mock delay for UI effect
                await new Promise(r => setTimeout(r, 600)); 
                
                const response = await fetch("/viewAllProducts");

                if (!response.ok) {
                    throw new Error("Failed to fetch");
                }

                const products = await response.json();
                renderTable(products);

            } catch (error) {
                // DEMO MODE: If backend is offline, generate beautiful mock data so the User can observe the UI.
                console.warn("Backend not found. Falling back to Demo Mode data.", error);
                
                const demoProducts = [
                    { id: 101, name: "Mechanical Keyboard Pro", description: "RGB Backlit, Cherry MX switches", price: 129.99, photoUrl: "https://images.unsplash.com/photo-1595225476474-87563907a212?w=500&q=80" },
                    { id: 102, name: "Wireless Noise-Canceling Headphones", description: "Active noise cancellation, 30h battery", price: 299.00, photoUrl: "https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?w=500&q=80" },
                    { id: 103, name: "Ultra-wide 34\" Monitor", description: "144Hz, 1ms response time, IPS panel", price: 549.50, photoUrl: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=500&q=80" },
                    { id: 104, name: "Ergonomic Office Chair", description: "Lumbar support, mesh back, adjustable", price: 199.99, photoUrl: "" }
                ];
                
                messageArea.innerHTML = `<div class="message success" style="background: #e0e7ff; color: #3730a3; border-color: #c7d2fe;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    Demo Mode Active: Loaded ${demoProducts.length} sample products (Backend offline).
                </div>`;
                
                renderTable(demoProducts);
                
            } finally {
                btn.innerHTML = btnOriginalHTML;
                btn.style.pointerEvents = 'auto';
                resultArea.style.opacity = "1";
            }

            function renderTable(products) {
                if (!products || products.length === 0) {
                    messageArea.innerHTML = '';
                    resultArea.innerHTML = `
                        <div class="empty-state">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                            <p>No products found in the database.</p>
                        </div>`;
                    return;
                }

                if (!messageArea.innerHTML.includes("Demo Mode")) {
                    messageArea.innerHTML = `<div class="message success">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        Successfully loaded ${products.length} products.
                    </div>`;
                }

                let rows = "";
                products.forEach(product => {
                    const imgSource = product.photoUrl ?? "";
                    
                    rows += `
                        <tr>
                            <td><span class="badge-id">#${product.id ?? "N/A"}</span></td>
                            <td class="product-name">${product.name ?? "Unnamed"}</td>
                            <td>${product.description ?? "-"}</td>
                            <td class="price">₹${product.price ? Number(product.price).toFixed(2) : "0.00"}</td>
                            <td><div class="truncate" title="${imgSource}">${imgSource || "-"}</div></td>
                            <td>
                                ${imgSource 
                                    ? `<img src="${imgSource}" alt="${product.name ?? 'Product'}" class="product-image" onerror="this.outerHTML='<div class=\\'no-image\\'><svg width=\\'24\\' height=\\'24\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'2\\'><line x1=\\'1\\' y1=\\'1\\' x2=\\'23\\' y2=\\'23\\'></line><path d=\\'M21 21H3V3\\'></path></svg>Error</div>'">` 
                                    : `<div class="no-image"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></div>`
                                }
                            </td>
                        </tr>
                    `;
                });

                resultArea.innerHTML = `
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Product Name</th>
                                    <th>Description</th>
                                    <th>Price</th>
                                    <th>URL Path</th>
                                    <th>Preview</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows}
                            </tbody>
                        </table>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
